apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- https://github.com/6ill/cloud-microservices-demo/kustomize/base
- patches/Ingress.frontend.yaml

patches:
- path: ./patches/Deployment.adservice.yaml
- path: ./patches/Deployment.cartservice.yaml
- patch: |-
    - op: add
      path: /spec/template/metadata/annotations
      value:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10254"
  target:
    kind: Deployment
    name: ingress-nginx-controller
    namespace: ingress-nginx
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
    spec:
      template:
        spec:
          containers:
            - name: server
              env:
              - name: ENABLE_TRACING
                value: "1"
              - name: OTEL_SERVICE_NAME
                value: "frontend"
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: "http://alloy.monitoring.svc.cluster.local:4317"
              - name: COLLECTOR_SERVICE_ADDR
                value: "alloy.monitoring.svc.cluster.local:4317"
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
